[build]
command = "npm run build"
publish = "dist"
environment = { NODE_VERSION = "22" }

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[headers]]
for = "/*"
[headers.values]
Referrer-Policy = "strict-origin-when-cross-origin"
X-Content-Type-Options = "nosniff"
Content-Security-Policy = "default-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://accounts.google.com; connect-src 'self'; img-src 'self' https://*.googleusercontent.com; style-src 'self' 'unsafe-inline' https://accounts.google.com; base-uri 'self'; form-action 'self'; manifest-src 'self'; worker-src 'self' blob:; font-src 'self'; frame-src 'self' https://accounts.google.com; frame-ancestors 'none'"
Permissions-Policy = "geolocation=(), midi=(),  payment=(), camera=(), microphone=(), usb=(), fullscreen=(self)"

[dev]
command = "vite"
port = 8888
